name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check whitespace
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

      - name: Check Bash syntax
        run: |
          git grep -Ilz '^#!.*bash' -- . \
            | xargs -0 -r -n1 bash -n

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: |
          git grep -Ilz '^#!.*bash' -- . \
            | xargs -0 -r shellcheck

      - name: Run actionlint
        run: docker run --rm -v "${PWD}:/repo:ro" --workdir /repo rhysd/actionlint:1.7.12 -color .github/workflows/*.yml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck analytics worker
        run: npm run typecheck:analytics-worker

      - name: Run unit tests
        run: npm run test:unit
