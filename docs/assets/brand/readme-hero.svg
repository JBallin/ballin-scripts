<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-labelledby="title desc">
  <title id="title">Ballin README hero</title>
  <desc id="desc">A dark studio workspace with the Ballin identity and the line Back up dotfiles. Keep your tools current.</desc>
  <defs>
    <filter id="type-shadow" x="-8%" y="-18%" width="120%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#050605" flood-opacity="0.34"/>
    </filter>
    <style>
      .wordmark {
        font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 116px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .prompt {
        font-family: "SF Mono", "Menlo", "Cascadia Mono", "Roboto Mono", monospace;
        font-size: 49px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .copy {
        font-family: "SF Pro Text", "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 29px;
        font-weight: 420;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <image href="readme-hero-background.png" x="0" y="0" width="1600" height="400" preserveAspectRatio="xMidYMid meet"/>

  <g filter="url(#type-shadow)">
    <text x="146" y="172" class="prompt" fill="#9be675" fill-opacity="0.94">&gt;_</text>
    <text x="228" y="174" class="wordmark" fill="#f4f1e8">ballin</text>
    <text x="143" y="243" class="copy" fill="#f4f1e8" fill-opacity="0.93">Back up dotfiles.</text>
    <text x="143" y="279" class="copy" fill="#f4f1e8" fill-opacity="0.93">Keep your tools current.</text>
  </g>
</svg>
